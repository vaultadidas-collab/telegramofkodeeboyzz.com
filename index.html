  function renderWeather(){
    if(!wxData)return;
    document.getElementById('wx-temp').textContent=Math.round(wxData.temperature_2m)+'°C';
    document.getElementById('wx-desc').textContent=wxIcon(wxData.weather_code)+' '+wxCode(wxData.weather_code)+' · 💨 '+Math.round(wxData.wind_speed_10m)+' km/h';
  }
  loadWeather();
  setInterval(loadWeather,15*60*1000); // refresh 15 phút

  function renderChrome(){
    const s=T[lang];
    document.getElementById('h-title').innerHTML=s.title;
    document.getElementById('h-sub').textContent=s.sub;
    document.getElementById('wx-lbl').textContent=s.wxLbl;
    document.getElementById('tm-lbl').textContent=s.tmLbl;
    document.getElementById('sync-h').textContent=s.syncH;
    document.getElementById('sync-p').textContent=s.syncP;
    document.getElementById('pt-h').textContent=s.ptH;
    document.getElementById('pt-store').textContent=s.ptStore;
    document.getElementById('pt-shop').textContent=s.ptShop;
    document.getElementById('ct-h').textContent=s.ctH;
    document.getElementById('bb-zalo').textContent=s.bbZalo;
    document.getElementById('bb-web').textContent=s.bbWeb;
    document.getElementById('filters').innerHTML=CATS.map(c=>
      `<div class="chip ${c.id===curCat?'active':''}" data-cat="${c.id}">${c[lang]}</div>`).join('');
    document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{curCat=c.dataset.cat;renderChrome();renderMenu();});
    renderWeather(); tick();
  }

  function renderMenu(){
    const s=T[lang];
    const list=curCat==='all'?TOURS:TOURS.filter(t=>t.cat===curCat);
    document.getElementById('menu').innerHTML=list.map(t=>`
      <div class="card">
        <div class="card-top">
          <h3>${t.name[lang]}</h3>
          ${t.tag?`<span class="tag ${t.tag}">${t.tag==='hot'?s.hot:s.new}</span>`:''}
        </div>
        <p class="desc">${t.desc[lang]}</p>
        <div class="meta"><span>🕒 ${t.dur}</span>${t.port?`<span>${s.port}</span>`:''}</div>
        <div class="price-row">
          <div class="price">
            <div class="from">${s.from}</div>
            <div class="now">${fmt(t.price)} <small>${s.per}</small></div>
          </div>
          <button class="book-btn" onclick="openSheet(${t.id})">${s.book}</button>
        </div>
      </div>`).join('');
  }

  function openSheet(id){
    const s=T[lang]; current=TOURS.find(t=>t.id===id);
    document.getElementById('s-name').textContent=current.name[lang];
    document.getElementById('s-desc').textContent=current.desc[lang];
    document.getElementById('s-tlabel').textContent=s.tlabel;
    document.getElementById('s-price').textContent=fmt(current.price);
    document.getElementById('s-paylabel').textContent=s.paylabel;
    document.getElementById('p-zalo').innerHTML=`${s.zalo}<br><small>${s.zaloS}</small>`;
    document.getElementById('p-crypto').innerHTML=`${s.crypto}<br><small>${s.cryptoS}</small>`;
    document.getElementById('p-okx').innerHTML=`${s.okx}<br><small>${s.okxS}</small>`;
    document.getElementById('overlay').classList.add('show');
  }
  function closeSheet(){document.getElementById('overlay').classList.remove('show');}
  document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeSheet();};

  function pay(method){
    const msg=`Đặt tour: ${current.name.vi}\nGiá: ${fmt(current.price)}${T[lang].per}\nThanh toán: ${method.toUpperCase()}`;
    if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({tour:current.name.vi,price:current.price,method}));}catch(e){}}
    if(method==='crypto')window.open(WALLET,'_blank');
    else if(method==='okx')window.open(OKX,'_blank');
    else window.open(`${ZALO}?text=${encodeURIComponent(msg)}`,'_blank');
  }

  document.querySelectorAll('#lang button').forEach(b=>b.onclick=()=>{
    lang=b.dataset.l;
    document.querySelector('#lang .on').classList.remove('on');
    b.classList.add('on');
    document.documentElement.lang=lang;
    renderChrome();renderMenu();
  });

  renderChrome();renderMenu();
</script>
</body>
</html>
